<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マルキョウユニオン</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ロゴ -->
<header class="logo">
    <img src="logo.png" alt="マルキョウユニオン">
</header>

<!-- メイン画像 -->
<div class="main-image">
    <img src="main-photo.jpeg"
         class="main-img"
         alt="メイン画像">
</div>

<!-- メニュー -->
<div class="menu">

    <!-- 組合とは -->
    <button class="btn"
            onclick="toggleContent('about-content')">
        👥 組合とは
    </button>

    <div id="about-content" class="content">

        <p>
            私たちの労働組合は、働く仲間が安心して働ける職場づくりを目指し、
            賃金・労働条件・福利厚生などの改善に取り組んでいます。
        </p>

    </div>


    <!-- 組合活動 -->
    <button class="btn"
            onclick="toggleContent('activity-content')">
        👥 組合活動
    </button>

    <div id="activity-content" class="content">

        <div class="activity-grid">

            <button class="sub-btn"
                    onclick="toggleContent('news-content')">
                📰 組合ニュース
            </button>

            <a href="マイカー共済.pdf"
               class="sub-btn"
               target="_blank">
                ❤️ 共済活動
            </a>

            <a href="労金まとめ.pdf"
               class="sub-btn"
               target="_blank">
                🏦 労金との活動
            </a>

        </div>

        <div id="news-content" class="sub-content">

            <a href="5月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 5月組合ニュース
            </a>

            <a href="6月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 6月組合ニュース
            </a>

            <a href="7月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 7月組合ニュース
            </a>

        </div>

    </div>


    <!-- ゼンセン共済・九州労金 -->
    <div class="bottom-links">

        <a href="https://uazensen.jp/kyousai_top/"
           class="btn"
           target="_blank">
            ❤️ ゼンセン共済
        </a>

        <a href="https://kyusyu-rokin.com/"
           class="btn"
           target="_blank">
            🏦 九州労金
        </a>

    </div>

</div>

<!-- LINE相談 -->
<!-- LINE相談 -->

<div class="line-contact">

    <h2>委員長へLINE相談</h2>

    <img src="429jxxxk.png"
         alt="https://qr-official.line.me/sid/L/429jxxxk.png"
         class="line-qr">

    <p>
        QRコードを読み取るか、
        下のボタンからLINEでご相談ください。
    </p>

    <a href="https://line.me/R/ti/p/@xxxxxxxx"
       target="_blank">

        📱 LINE相談はこちら

    </a>

</div>
<script>
function toggleContent(id) {

    const content = document.getElementById(id);

    if (!content) return;

    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}
</script>

</body>
</html>
