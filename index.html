<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>マルキョウユニオン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ロゴ -->
<div class="logo">
  <img src="logo.png" alt="マルキョウユニオン">
</div>

<!-- メイン画像 -->
<img src="main-photo.jpeg" class="main-img">

<!-- メニュー -->
<!-- メニュー -->
<div class="menu">

    <!-- 左側 -->
    <div class="left-menu">

        <!-- 組合とは -->
        <div class="card">

            <button class="btn"
                    onclick="toggleContent('about-content')">

                👥 組合とは

            </button>

            <div id="about-content" class="content">

                <h2>組合とは</h2>

                <p>
                    労働組合の目的や役割、
                    活動内容をご紹介します。
                </p>

            </div>

        </div>

        <!-- 労使協議会 -->

        <div class="card">

            <button class="btn"
                    onclick="toggleContent('meeting-content')">

                📄 労使協議会

            </button>

            <div id="meeting-content" class="content">

                <p>
                    労使協議会資料をご覧いただけます。
                </p>

                <a href="meeting.pdf"
                   class="pdf-btn"
                   target="_blank">

                    資料を見る

                </a>

            </div>

        </div>

        <!-- アンケート -->

        <div class="card">

            <button class="btn"
                    onclick="toggleContent('survey-content')">

                📊 アンケート結果

            </button>

            <div id="survey-content"
                 class="content">

                <p>

                    アンケート結果はこちらです。

                </p>

                <a href="questionnaire.pdf"
                   class="pdf-btn"
                   target="_blank">

                    資料を見る

                </a>

            </div>

        </div>

        <!-- 共済・労金 -->

        <div class="card">

            <button class="btn"
                    onclick="openLink()">

                💰 共済・労金

            </button>

        </div>

    </div>

    <!-- 右側 -->
    <div class="right-menu">

        <!-- 組合活動 -->

        <div class="card">

            <button class="btn"
                    onclick="toggleContent('activity-content')">

                👥 組合活動

            </button>

            <div id="activity-content"
                 class="content">

                <h2>組合活動</h2>

                <h3>📰 組合ニュース</h3>

                <a href="3月組合ニュース.pdf"
                   class="pdf-btn"
                   target="_blank">

                    3月号

                </a>

                <a href="4月組合ニュース.pdf"
                   class="pdf-btn"
                   target="_blank">

                    4月号

                </a>

                <a href="5月組合ニュース.pdf"
                   class="pdf-btn"
                   target="_blank">

                    5月号

                </a>

                <a href="6月組合ニュース.pdf"
                   class="pdf-btn"
                   target="_blank">

                    6月号

                </a>

                <hr>

    window.open(
      "https://kyusyu-rokin.com/",
      "_blank"
    );

  }

}

</script>

</body>
</html>
