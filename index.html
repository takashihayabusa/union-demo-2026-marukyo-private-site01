
<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>マルキョウユニオン</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ロゴ -->
<div class="logo">
    <img src="logo.png" alt="マルキョウユニオン">
</div>

<!-- メイン画像 -->
<img src="main-photo.jpeg" class="main-img">

<!-- メニュー -->
<div class="menu-grid">

    <!-- 左 -->
    <div class="menu-column">

        <button class="btn">
            👥 組合とは
        </button>

        <button class="btn">
            💰 ゼンセン共済・九州労働金庫
        </button>

    </div>

    <!-- 右 -->
    <div class="menu-column">

        <button class="btn" onclick="toggleContent('activity-content')">
    　　　👥 組合活動
　　　　</button>

　　<div id="activity-content" class="content">

    <!-- 組合ニュース -->
   　　 <button class="sub-btn" onclick="toggleContent('news-content')">
        📰 組合ニュース
    　　</button>

    　　<div id="news-content" class="content">

        　<a href="5月組合ニュース.pdf"
          　 class="pdf-btn"
           　target="_blank">
            　📄 5月組合ニュース
        　</a>

        　<a href="6月組合ニュース.pdf"
           　class="pdf-btn"
           　target="_blank">
            　📄 6月組合ニュース
        　</a>

        　<a href="7月組合ニュース.pdf"
           　class="pdf-btn"
           　target="_blank">
            　📄 7月組合ニュース
        　</a>

    　　</div>

    <!-- 共済活動 -->
    　　<button class="sub-btn" onclick="toggleContent('kyosai-content')">
        　　❤️ 共済活動
    　　</button>

    <div id="kyosai-content" class="content">

        <a href="共済活動.pdf"
           class="pdf-btn"
           target="_blank">
            📄 共済活動資料を見る
        </a>

    <!-- 組合活動 -->


    <button class="sub-btn" onclick="toggleContent('kyosai-content')">
        ❤️ 共済活動
    </button>

    <div id="kyosai-content" style="display:none;">

        <a href="共済活動.pdf" class="pdf-btn" target="_blank">
            📄 共済活動資料を見る
        </a>

    </div>

    
</div>

    <hr>

    <!-- 九州労働金庫 -->
    <button class="sub-btn"
            onclick="toggleContent('roukin-content')">
        🏦 九州労働金庫
    </button>

    <div id="roukin-content" style="display:none;">

        <a href="https://kyusyu-rokin.com/"
           class="pdf-btn"
           target="_blank">
            九州労働金庫ホームページ
        </a>

    </div>

</div>


<script>

function toggleContent(id){

    var content=document.getElementById(id);

    if(content.style.display==="block"){

        content.style.display="none";

    }else{

        content.style.display="block";

    }

}

</script>

</body>
</html>
