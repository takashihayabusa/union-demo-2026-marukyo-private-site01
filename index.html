<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>マルキョウユニオン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ロゴ -->
<div class="logo">
  <img src="logo.png" alt="マルキョウユニオン">
</div>

<!-- メイン画像 -->
<img src="main-photo.jpeg" class="main-img">

<!-- メニュー -->
<div class="menu">

  <!-- 組合とは -->
  <div id="about-section" class="accordion">

    <button class="btn" onclick="toggleContent('about-content')">
      🏢 組合とは
    </button>

    <div id="about-content" class="content">

      <h2>組合とは</h2>

      <p>
        私たち労働組合は「一人ひとりが安心して元気に
        働き続けられる職場」を目指して活動しています
      </p>

    </div>

  </div>

  <!-- 組合活動とは -->
  <div id="activity-section" class="accordion">

    <button class="btn" onclick="toggleContent('activity-content')">
      👥 組合活動とは
    </button>

    <div id="activity-content" class="content">

      <h2>組合活動とは</h2>

      <p>
        賃上げやボーナスの交渉による労働条件の維持,改善や<br>
        職場環境の改善,共済制度の推進による可処分所得Upを<br>
        目指しています
      </p>

      <a href="activity.pdf" target="_blank" class="pdf-btn">
        ▶ 活動資料を見る
      </a>

    </div>

  </div>

  <!-- 組合活動報告 -->
  <div id="report-section" class="accordion">

  <button class="btn" onclick="toggleContent('report-content')">
    📄 組合活動報告
  <h3>💰 共済活動</h3>

<a href="kyosai.pdf" target="_blank">
  ▶ 共済活動資料を見る
</a>

<br><br>

<h3>🏦 九州労働金庫活動</h3>

<a href="rokin.pdf" target="_blank">
  ▶ 労金活動資料を見る
</a>
  </button>

  <div id="report-content" class="content">

    <h3>📰 組合ニュース</h3>

    <a href="5月組合ニュース.pdf" target="_blank" rel="noopener">
      📄 2026年5月号（PDFが開きます）
    </a>

    <br><br>

    <a href="4月組合ニュース.pdf" target="_blank" rel="noopener">
      📄 2026年4月号（PDFが開きます）
    </a>

    <br><br>

    <a href="3月組合ニュース.pdf" target="_blank" rel="noopener">
      📄 2026年3月号（PDFが開きます）
    </a>

    <br><br>

    <p style="font-size:14px;color:#666;">
      ※PDFは新しいタブで開きます。閲覧後はタブを閉じるとホームページへ戻れます。
    </p>

  </div>

</div>
  <!-- 共済・労金 -->
  <div>

    <button class="btn" onclick="openLink()">
      💰 共済・労金
    </button>

  </div>

  <!-- LINE相談 -->
  <div class="line-contact">

    <a href="https://lin.ee/71ipfBE" target="_blank">
      LINEで相談する
    </a>

  </div>

</div>

<script>

function toggleContent(id) {

  const content = document.getElementById(id);

  if (content.style.display === "block") {
    content.style.display = "none";
  } else {
    content.style.display = "block";
  }

}

function openLink() {

  const choice = confirm(
    "OK：UAゼンセン共済\nキャンセル：九州労金"
  );

  if (choice) {

    window.open(
      "https://uazensen.jp/kyousai_top/",
      "_blank"
    );

  } else {

    window.open(
      "https://kyusyu-rokin.com/",
      "_blank"
    );

  }

}

</script>

</body>
</html>
