<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>マルキョウユニオン</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ロゴ -->
<header class="logo">

    <img src="logo.png" alt="マルキョウユニオン">

</header>

<!-- メイン画像 -->
<div class="main-image">
    <img src="main-photo.jpeg"
         class="main-img"
         alt="メイン画像">
</div>
<!-- メニュー全体 -->
<div class="menu">

    <!-- 組合とは -->
    <button class="btn"
            onclick="toggleContent('about-content')">
        👥 組合とは
    </button>

    <div id="about-content" class="content">

        <a href="union.html" class="pdf-btn">
            組合とは
        </a>

    </div>

    <!-- 組合活動 -->
    <button class="btn"
            onclick="toggleContent('activity-content')">
        👥 組合活動
    </button>

    <div id="activity-content" class="content">

        <div class="activity-grid">

            <button class="sub-btn"
                    onclick="toggleContent('news-content')">
                📰 組合ニュース
            </button>

            <a href="kyosai.pdf"
               class="sub-btn"
               target="_blank">
               ❤️ 共済活動
            </a>

            <a href="rokin.pdf"
               class="sub-btn"
               target="_blank">
               🏦 労金との活動
            </a>

        </div>

        <div id="news-content" class="sub-content">

            <a href="5月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
               📄 5月組合ニュース
            </a>

            <a href="6月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
               📄 6月組合ニュース
            </a>

            <a href="7月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
               📄 7月組合ニュース
            </a>

        </div>

    </div>

    <!-- 下の２つ -->

    <div class="bottom-links">

    <a href="https://uazensen.jp/kyousai_top/"
       class="btn"
       target="_blank">
        ❤️ ゼンセン共済
    </a>

    <a href="https://kyusyu-rokin.com/"
       class="btn"
       target="_blank">
        🏦 九州労金
    </a>

</div>
</div>
    <!-- 右側 -->

<!-- LINE相談 -->
<div class="line-contact">

    <a href="https://line.me/R/ti/p/@xxxxxxxx"
       target="_blank">

        📱 LINE相談はこちら

    </a>

</div>

<script>
function toggleContent(id) {

    const content = document.getElementById(id);

    if (!content) return;

    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}
</script>


</body>
</html>
