<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>マルキョウユニオン</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ロゴ -->
<header class="logo">

    <img src="logo.png" alt="マルキョウユニオン">

</header>

<!-- メイン画像 -->
<div class="main-image">
    <img src="main-photo.jpeg"
         class="main-img"
         alt="メイン画像">
</div>
<!-- メニュー全体 -->
<div class="menu">

    <!-- 組合とは -->
    <button class="btn"
            onclick="toggleContent('about-content')">
        👥 組合とは
    </button>

    <div id="about-content" class="content">

        <a href="union.html" class="pdf-btn">
            組合とは
        </a>

    </div>

    <!-- 組合活動 -->
    <button class="btn"
            onclick="toggleContent('activity-content')">
        👥 組合活動
    </button>

    <div id="activity-content" class="content">

        <!-- 組合ニュース -->
        <button class="sub-btn"
                onclick="toggleContent('news-content')">
            📰 組合ニュース
        </button>

        <div id="news-content" class="sub-content">

            <a href="5月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 5月組合ニュース
            </a>

            <a href="6月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 6月組合ニュース
            </a>

            <a href="7月組合ニュース.pdf"
               class="pdf-btn"
               target="_blank">
                📄 7月組合ニュース
            </a>

        </div>

        <!-- 共済活動 -->
        <button class="sub-btn"
                onclick="toggleContent('activity-kyosai')">
            ❤️ 共済活動
        </button>

        <div id="activity-kyosai" class="sub-content">

            <a href="マイカー共済.pdf"
               class="pdf-btn"
               target="_blank">
                📄 共済活動資料を見る
            </a>

        </div>

        <!-- 九州労働金庫 -->
        <button class="sub-btn"
                onclick="toggleContent('roukin-content')">
            🏦 九州労働金庫との活動
        </button>

        <div id="roukin-content" class="sub-content">

            <a href="労金まとめ.pdf"
               class="pdf-btn"
               target="_blank">
                📄 九州労働金庫との活動を見る
            </a>

        </div>

    </div>

    <!-- 共済・労金 -->
    <div class="link-row">

        <button class="btn half-btn"
                onclick="window.open('https://uazensen.jp/kyousai_top/','_blank')">
            ❤️ ゼンセン共済
        </button>

        <button class="btn half-btn"
                onclick="window.open('https://kyusyu-rokin.com/','_blank')">
            🏦 九州労働金庫
        </button>

    </div>

</div>

    <!-- 右側 -->

<!-- LINE相談 -->
<div class="line-contact">

    <a href="https://line.me/R/ti/p/@xxxxxxxx"
       target="_blank">

        📱 LINE相談はこちら

    </a>

</div>

<script>
function toggleContent(id) {

    const content = document.getElementById(id);

    if (!content) return;

    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        content.style.display = "block";
    }
}
</script>


</body>
</html>
