  </div>

  <!-- 組合活動 -->

  <h2>組合活動</h2>

  <p>
    組合では、職場環境の改善や働きやすい職場づくりを行っています。<br>

  <!-- 活動資料 -->

<!-- JavaScript -->
<script>

  // 開閉
  function toggleContent(id) {

    const content = document.getElementById(id);

    content.style.display =
      content.style.display === "block"
      ? "none"
      : "block";
  }

  // 共済リンク
  function openLink() {

    const choice = confirm(
      "OK：UAゼンセン共済\nキャンセル：九州労金"
    );

    if (choice) {

      window.open(
        "https://uazensen.jp/kyousai_top/",
        "_blank"
      );

    } else {

      window.open(
        "https://kyusyu-rokin.com/",
        "_blank"
      );
    }
  }

</script>
